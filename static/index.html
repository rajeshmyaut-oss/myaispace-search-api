<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyAI Search — myaispace.in</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161b25;
      --surface2:  #1e2535;
      --border:    #2a3347;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e8eaf0;
      --muted:     #7a85a0;
      --success:   #34d399;
      --radius:    14px;
      --font:      'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: var(--accent2);
    }

    /* ── Hero Section ──────────────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 40px;
      text-align: center;
      transition: all 0.4s ease;
    }

    .hero.compact {
      padding: 24px 20px 20px;
    }

    .hero-title {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .hero.compact .hero-title { font-size: 1.5rem; }

    .hero-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .hero.compact .hero-sub { display: none; }

    /* ── Search Box ────────────────────────────────────────────── */
    .search-wrap {
      width: 100%;
      max-width: 720px;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 6px 8px 6px 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
      gap: 8px;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(108,99,255,0.15);
    }

    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      padding: 8px 0;
    }

    #searchInput::placeholder { color: var(--muted); }

    .search-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 40px;
      color: #fff;
      cursor: pointer;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover { opacity: 0.88; transform: scale(1.02); }
    .search-btn:active { transform: scale(0.98); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Suggestions ───────────────────────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }

    .hero.compact .suggestions { display: none; }

    .suggest-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggest-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    /* ── Main Content ──────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      padding: 0 20px 60px;
    }

    /* ── Answer Card ───────────────────────────────────────────── */
    .answer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      display: none;
    }

    .answer-card.visible { display: block; }

    .answer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .ai-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .answer-label {
      font-size: 0.85rem;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .answer-text {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.75;
      min-height: 24px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Thinking Indicator ────────────────────────────────────── */
    .thinking {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
    }

    .thinking.visible { display: flex; }

    .dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:0.4 }
      40%          { transform: translateY(-6px); opacity:1 }
    }

    /* ── Sources ───────────────────────────────────────────────── */
    .sources-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }

    .sources-card.visible { display: block; }

    .sources-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .sources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .source-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .source-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .source-favicon {
      width: 16px; height: 16px;
      border-radius: 4px;
      background: var(--border);
    }

    .source-name {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .source-title {
      font-size: 0.82rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Chat History ──────────────────────────────────────────── */
    .chat-history { display: flex; flex-direction: column; gap: 24px; }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-radius: 20px 20px 4px 20px;
      padding: 12px 18px;
      max-width: 80%;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .msg-ai { display: flex; flex-direction: column; gap: 12px; }

    /* ── Follow-up Bar ─────────────────────────────────────────── */
    .followup-bar {
      display: none;
      margin-top: 16px;
    }

    .followup-bar.visible { display: block; }

    .followup-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .followup-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .followup-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .followup-chip:hover {
      border-color: var(--accent);
      background: rgba(108,99,255,0.1);
    }

    /* ── Settings Panel ────────────────────────────────────────── */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .settings-bar.hidden { display: none; }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .toggle {
      width: 36px; height: 20px;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    .toggle.on { background: var(--accent); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: left 0.2s;
    }

    .toggle.on::after { left: 19px; }

    /* ── Error State ────────────────────────────────────────────── */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 0.9rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .hero-title { font-size: 2rem; }
      .search-btn span { display: none; }
      .sources-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header>
  <a class="logo" href="/">
    <div class="logo-icon">✦</div>
    MyAISpace
  </a>
  <div class="header-right">
    <span class="badge" id="modelBadge">Qwen3 8B</span>
    <span class="badge" id="statusBadge" style="color:#34d399">● Online</span>
  </div>
</header>

<!-- ── Hero / Search ──────────────────────────────────────────────────── -->
<div class="hero" id="hero">
  <h1 class="hero-title">Ask anything.<br/>Get instant answers.</h1>
  <p class="hero-sub">Powered by Qwen3 AI + Real-time Web Search</p>

  <div class="search-wrap">
    <div class="search-box">
      <input
        id="searchInput"
        type="text"
        placeholder="Ask me anything..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="sendBtn" onclick="handleSearch()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <span>Ask AI</span>
      </button>
    </div>

    <div class="suggestions" id="suggestions">
      <div class="suggest-chip" onclick="setQuery(this)">What is SAP CPI?</div>
      <div class="suggest-chip" onclick="setQuery(this)">How does AI work?</div>
      <div class="suggest-chip" onclick="setQuery(this)">Latest India tech news</div>
      <div class="suggest-chip" onclick="setQuery(this)">Best Python frameworks 2025</div>
      <div class="suggest-chip" onclick="setQuery(this)">What is cloud computing?</div>
    </div>
  </div>
</div>

<!-- ── Results Area ────────────────────────────────────────────────────── -->
<main id="resultsArea">

  <!-- Settings Bar -->
  <div class="settings-bar hidden" id="settingsBar">
    <div class="toggle-group">
      <div class="toggle on" id="webSearchToggle" onclick="toggleWebSearch()"></div>
      <span>Web Search</span>
    </div>
    <div style="flex:1"></div>
    <span style="font-size:0.8rem;color:var(--muted)" id="queryLabel"></span>
  </div>

  <!-- Chat History -->
  <div class="chat-history" id="chatHistory"></div>

  <!-- Current Answer -->
  <div id="currentBlock">
    <div class="thinking" id="thinking">
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
      MyAI is thinking...
    </div>

    <div class="sources-card" id="sourcesCard">
      <div class="sources-title">🌐 Sources</div>
      <div class="sources-grid" id="sourcesGrid"></div>
    </div>

    <div class="answer-card" id="answerCard">
      <div class="answer-header">
        <div class="ai-avatar">✦</div>
        <span class="answer-label">MyAI Answer</span>
      </div>
      <div class="answer-text" id="answerText"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="followup-bar" id="followupBar">
      <div class="followup-label">Follow-up questions</div>
      <div class="followup-chips" id="followupChips"></div>
    </div>
  </div>

</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE   = window.location.origin;   // Same server
const API_KEY    = localStorage.getItem("myaispace_key") || "";
let   webSearch  = true;
let   isLoading  = false;
let   history    = [];   // {role, content}

// ── Init ──────────────────────────────────────────────────────────────────────
window.onload = async () => {
  await ensureApiKey();
  checkOllamaStatus();
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSearch(); }
  });
};

// ── Auto-generate API key if not saved ───────────────────────────────────────
async function ensureApiKey() {
  if (API_KEY) return;
  try {
    const r = await fetch(`${API_BASE}/v1/auth/generate-key`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: "MyAISpace User", email: `user_${Date.now()}@myaispace.in` })
    });
    const d = await r.json();
    if (d.key) {
      localStorage.setItem("myaispace_key", d.key);
      location.reload();
    }
  } catch(e) { console.warn("Could not auto-generate key:", e); }
}

// ── Check Ollama status ───────────────────────────────────────────────────────
async function checkOllamaStatus() {
  try {
    const r = await fetch(`${API_BASE}/health`);
    const d = await r.json();
    document.getElementById("statusBadge").textContent = "● Online";
    document.getElementById("statusBadge").style.color = "#34d399";
  } catch {
    document.getElementById("statusBadge").textContent = "● Offline";
    document.getElementById("statusBadge").style.color = "#f87171";
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setQuery(el) {
  document.getElementById("searchInput").value = el.textContent;
  handleSearch();
}

function toggleWebSearch() {
  webSearch = !webSearch;
  document.getElementById("webSearchToggle").classList.toggle("on", webSearch);
}

function getKey() {
  return localStorage.getItem("myaispace_key") || "";
}

// ── Main Search Handler ───────────────────────────────────────────────────────
async function handleSearch() {
  const input = document.getElementById("searchInput");
  const query = input.value.trim();
  if (!query || isLoading) return;

  isLoading = true;

  // Compact hero
  document.getElementById("hero").classList.add("compact");
  document.getElementById("settingsBar").classList.remove("hidden");
  document.getElementById("queryLabel").textContent = `"${query}"`;

  // Save user message to history and show it
  history.push({ role: "user", content: query });
  appendUserMessage(query);

  input.value = "";
  input.focus();

  // Reset current block
  document.getElementById("thinking").classList.add("visible");
  document.getElementById("sourcesCard").classList.remove("visible");
  document.getElementById("answerCard").classList.remove("visible");
  document.getElementById("answerText").innerHTML = "";
  document.getElementById("followupBar").classList.remove("visible");
  document.getElementById("errorMsg").classList.remove("visible");
  document.getElementById("sendBtn").disabled = true;

  try {
    await streamAnswer(query);
  } catch(e) {
    showError("Connection failed. Make sure the API server is running at port 8000.");
  } finally {
    isLoading = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("thinking").classList.remove("visible");
  }
}

// ── Stream answer via SSE ─────────────────────────────────────────────────────
async function streamAnswer(query) {
  const key = getKey();

  const response = await fetch(`${API_BASE}/v1/ai/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-API-Key": key
    },
    body: JSON.stringify({
      message: query,
      history: history.slice(-6),
      with_search: webSearch
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error || "API error");
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  let fullText = "";
  let answerShown = false;

  // Add cursor
  const answerEl = document.getElementById("answerText");

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n\n");
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      try {
        const data = JSON.parse(line.slice(6));

        if (data.type === "sources") {
          renderSources(data.sources);
          document.getElementById("thinking").classList.remove("visible");
        }

        if (data.type === "token") {
          if (!answerShown) {
            document.getElementById("answerCard").classList.add("visible");
            document.getElementById("thinking").classList.remove("visible");
            answerShown = true;
          }
          fullText += data.token;
          answerEl.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
          answerEl.closest("main").scrollTop = 99999;
          window.scrollTo(0, document.body.scrollHeight);
        }

        if (data.type === "done") {
          answerEl.innerHTML = formatMarkdown(fullText);
          history.push({ role: "assistant", content: fullText });
          showFollowups(query);
        }

        if (data.type === "error") {
          showError(data.message);
        }

      } catch(e) { /* skip bad json */ }
    }
  }
}

// ── Render sources ────────────────────────────────────────────────────────────
function renderSources(sources) {
  if (!sources || sources.length === 0) return;
  const grid = document.getElementById("sourcesGrid");
  grid.innerHTML = "";
  sources.forEach(s => {
    const domain = s.source || new URL(s.url).hostname.replace("www.", "");
    const a = document.createElement("a");
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.className = "source-item";
    a.innerHTML = `
      <img class="source-favicon"
           src="https://www.google.com/s2/favicons?domain=${domain}&sz=32"
           onerror="this.style.display='none'" />
      <span class="source-name">${domain}</span>
      <span class="source-title">${escapeHtml(s.title)}</span>
    `;
    grid.appendChild(a);
  });
  document.getElementById("sourcesCard").classList.add("visible");
}

// ── Append user message to chat history ──────────────────────────────────────
function appendUserMessage(text) {
  if (history.length <= 1) return;   // first message — no need to duplicate
  const div = document.createElement("div");
  div.className = "msg-user";
  div.innerHTML = `<div class="msg-user-bubble">${escapeHtml(text)}</div>`;
  document.getElementById("chatHistory").appendChild(div);
}

// ── Follow-up suggestions ─────────────────────────────────────────────────────
function showFollowups(query) {
  const followups = generateFollowups(query);
  const chips = document.getElementById("followupChips");
  chips.innerHTML = "";
  followups.forEach(f => {
    const c = document.createElement("div");
    c.className = "followup-chip";
    c.textContent = f;
    c.onclick = () => {
      document.getElementById("searchInput").value = f;
      handleSearch();
    };
    chips.appendChild(c);
  });
  document.getElementById("followupBar").classList.add("visible");
}

function generateFollowups(query) {
  const q = query.toLowerCase();
  if (q.includes("sap")) return ["How to write a Groovy script in SAP CPI?", "What adapters are used in SAP CPI?", "Explain SAP BTP vs SAP CPI"];
  if (q.includes("python")) return ["Best Python libraries for data science", "Python vs JavaScript for backend", "How to learn Python fast?"];
  if (q.includes("ai") || q.includes("artificial")) return ["How does machine learning work?", "What is a neural network?", "AI vs Machine Learning difference"];
  return [`Tell me more about ${query}`, `Examples of ${query}`, `How to get started with ${query}`];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = "⚠ " + msg;
  el.classList.add("visible");
  document.getElementById("thinking").classList.remove("visible");
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatMarkdown(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, `<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:0.9em">$1</code>`)
    .replace(/\n/g, "<br/>");
}
</script>
